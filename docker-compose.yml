# Hermes — local Docker Compose
#
# Runs the all-in-one image that bundles:
#   • hermes-workspace (Node UI)   on :3000
#   • hermes-agent (gateway)       on :8642 (internal only)
#   • codex-adapter (Codex bridge) on :8645 (internal only)
#
# Quick start:
#   cp .env.example .env
#   # Edit .env and set OPENAI_API_KEY
#   docker compose up
#   open http://localhost:3000
#
# Build from source (instead of pulling the pre-built image):
#   docker compose up --build

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    # Or pull the pre-built image:
    # image: ghcr.io/thesaghbini/hermes:latest
    env_file:
      - .env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_SERVER_KEY: ${API_SERVER_KEY:-}
      HERMES_PASSWORD: ${HERMES_PASSWORD:-}
      PORT: ${PORT:-3000}
      # Codex CLI settings (optional overrides)
      CODEX_CLI_SANDBOX: ${CODEX_CLI_SANDBOX:-read-only}
      CODEX_CLI_APPROVAL_MODE: ${CODEX_CLI_APPROVAL_MODE:-never}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - hermes-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${PORT:-3000}/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  hermes-data:

