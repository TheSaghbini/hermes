services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-local-test-only-change-this-password}
      HERMES_AUTO_START: ${HERMES_AUTO_START:-true}
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-custom}
      HERMES_DEFAULT_MODEL: ${HERMES_DEFAULT_MODEL:-llama3.2}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      USE_LEGACY_UI: ${USE_LEGACY_UI:-false}
      PORT: 8080
    ports:
      - "${HERMES_PORT:-8080}:8080"
    volumes:
      - hermes-data:/data

  ollama:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    environment:
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  hermes-data:
  ollama-data:
